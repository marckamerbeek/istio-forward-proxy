apiVersion: v2
name: istio-forward-proxy
description: |
  Forward proxy for Istio ambient mode that originates mTLS to an upstream
  proxy chain while preserving absolute paths in HTTP request-lines.
  Replaces Istio's DestinationRule + ServiceEntry TLS origination for the
  specific case where the upstream proxy (e.g. Squid) requires absolute-form
  requests instead of relative paths.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - istio
  - ambient
  - forward-proxy
  - egress
  - tls-origination
  - squid
home: https://github.com/marckamerbeek/istio-forward-proxy
maintainers:
  - name: Marc Kamerbeek
    url: https://github.com/marckamerbeek
