# ====================================================================
# istio-forward-proxy Helm values
# ====================================================================

# --------------------------------------------------------------------
# Image
# --------------------------------------------------------------------
image:
  repository: ghcr.io/marckamerbeek/istio-forward-proxy
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: registry-cred

# --------------------------------------------------------------------
# Naming
# --------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# --------------------------------------------------------------------
# Replicas and scaling
# --------------------------------------------------------------------
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# --------------------------------------------------------------------
# Proxy configuration
# --------------------------------------------------------------------
proxy:
  listenAddr: ":3128"
  metricsAddr: ":9090"
  logLevel: info

  upstream:
    # host:port of the first upstream proxy in the chain.
    host: "upstream-proxy.corp.local:8080"
    # Proxy-Authorization header value sent to the upstream.
    # Prefer authSecretRef over a plain value.
    authValue: ""
    authSecretRef:
      name: ""  # Secret name with key 'proxy-auth'
      key: "proxy-auth"

  mtls:
    enabled: true
    # Skip TLS verification (testing only, never use in production)
    insecureSkipVerify: false
    certManager:
      enabled: true
      issuerRef:
        name: internal-ca
        kind: ClusterIssuer
        group: cert-manager.io
      dnsNames:
        - "forward-proxy.istio-egress.svc.cluster.local"
      duration: 2160h    # 90 days
      renewBefore: 360h  # 15 days before expiry
    # When certManager.enabled=false, reference an existing Secret
    # with tls.crt, tls.key, ca.crt
    existingSecret: ""

  extraHeaders: {}
    # X-Corp-Id: "platform-egress"
    # X-Request-By: "istio-forward-proxy"

  timeouts:
    dial: 10s
    idle: 90s
    read: 60s
    write: 60s

# --------------------------------------------------------------------
# Istio ambient integration
# --------------------------------------------------------------------
istio:
  ambient:
    # Adds istio.io/dataplane-mode=ambient label to pods
    enabled: true

  peerAuthentication:
    enabled: true
    mtlsMode: STRICT

  authorizationPolicy:
    enabled: true
    # Namespaces allowed to reach the proxy. Empty = same namespace only.
    allowedNamespaces:
      - "*"  # all namespaces for a central shared proxy
    allowedPrincipals: []
    # - "cluster.local/ns/team-a/sa/app-x"
    # - "cluster.local/ns/team-b/sa/*"

  waypoint:
    enabled: false

# --------------------------------------------------------------------
# NetworkPolicies
# --------------------------------------------------------------------
networkPolicies:
  egressFromProxy:
    enabled: true
    allowDNS: true
    upstreamCIDRs: []
    # - 10.20.0.0/16
    upstreamPorts:
      - 8080
      - 443

  ingressToProxy:
    enabled: true
    allowFromNamespaces:
      - "*"

# --------------------------------------------------------------------
# Service
# --------------------------------------------------------------------
service:
  type: ClusterIP
  proxyPort: 3128

# --------------------------------------------------------------------
# Monitoring
# --------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  # release: kube-prometheus-stack

# --------------------------------------------------------------------
# RBAC
# --------------------------------------------------------------------
rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --------------------------------------------------------------------
# Pod configuration
# --------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# --------------------------------------------------------------------
# Scheduling
# --------------------------------------------------------------------
nodeSelector: {}
tolerations: []

# Spread across nodes and zones for HA
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: istio-forward-proxy
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: istio-forward-proxy

# --------------------------------------------------------------------
# Health probes
# --------------------------------------------------------------------
probes:
  readiness:
    path: /readyz
    port: 9090
    initialDelaySeconds: 3
    periodSeconds: 5
  liveness:
    path: /healthz
    port: 9090
    initialDelaySeconds: 10
    periodSeconds: 10
