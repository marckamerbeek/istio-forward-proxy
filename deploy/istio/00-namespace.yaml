# Namespace for the central forward proxy.
# Apply this BEFORE helm install to ensure the namespace is correctly labeled.
apiVersion: v1
kind: Namespace
metadata:
  name: istio-egress
  labels:
    # Opt the namespace into Istio ambient mode
    istio.io/dataplane-mode: ambient
    # Required for NetworkPolicy namespaceSelector matching
    kubernetes.io/metadata.name: istio-egress
    # Pod Security Admission: restricted is sufficient for distroless nonroot
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
