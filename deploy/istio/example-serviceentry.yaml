# Example: how a team registers an external host.
# Deploy this in your team namespace to allow traffic to example.com
# through the central forward proxy.
#
# The forward proxy watches ServiceEntries cluster-wide and adds the host
# to its allowlist. Traffic to example.com via HTTP_PROXY is then allowed;
# other hosts receive a 403.
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: example-com
  namespace: team-a
spec:
  hosts:
    - example.com
    - www.example.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
    - number: 80
      name: http
      protocol: HTTP
  resolution: DNS
  location: MESH_EXTERNAL
---
# Wildcard example: all subdomains of a corporate API provider
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: corporate-api
  namespace: team-a
spec:
  hosts:
    - "*.api.corp-provider.com"
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
